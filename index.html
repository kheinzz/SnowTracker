<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>GPX + Sentinel-2 Viewer</title>

<link href="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.css" rel="stylesheet" />
<script src="https://unpkg.com/maplibre-gl@3.6.1/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }
body {
  height: 100dvh;
  display: flex;
  flex-direction: column;     /* desktop: panel top, map bottom */
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  background: #111827;
  color: #e9ecef;
  overflow: hidden;
}

/* ── MAP ─────────────────────────────────────────────────────────────────── */
#map { flex: 1; min-height: 0; }

/* ── PANEL ───────────────────────────────────────────────────────────────── */
#panel {
  flex-shrink: 0;
  background: #1b2232;
  border-bottom: 1px solid rgba(255,255,255,0.07);
  z-index: 10;
}

/* Settings row — always visible on desktop, collapsible on mobile */
.settings-row {
  display: flex;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: 8px 10px;
  padding: 10px 14px 10px;
  overflow: hidden;
  /* On mobile, starts collapsed: max-height animated via .open */
  max-height: 400px;
  transition: max-height 0.3s ease, padding 0.3s ease;
}

/* Nav row — always visible */
.nav-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  flex-wrap: wrap;
  min-height: 56px;
}

/* ── FIELDS ──────────────────────────────────────────────────────────────── */
.field { display: flex; flex-direction: column; gap: 3px; }
.field-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: #6b7280;
}
.ctrl {
  height: 36px;
  padding: 0 10px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 8px;
  color: #e9ecef;
  font-size: 13px;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
}
.ctrl:focus { border-color: #60a5fa; background: rgba(96,165,250,0.08); }

input[type="date"].ctrl { color-scheme: dark; min-width: 130px; }
input[type="file"].ctrl { padding: 6px 8px; font-size: 12px; cursor: pointer; }

.slider-wrap {
  display: flex;
  align-items: center;
  gap: 8px;
  height: 36px;
}
.slider-wrap input[type="range"] { width: 80px; accent-color: #60a5fa; }
.slider-val { font-size: 12px; color: #9ca3af; min-width: 28px; }

/* ── BUTTONS ─────────────────────────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  height: 36px; padding: 0 14px;
  border: none; border-radius: 8px;
  font-size: 13px; font-weight: 600;
  cursor: pointer; white-space: nowrap;
  transition: background 0.15s, transform 0.1s, opacity 0.15s;
}
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

.btn-primary {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: #fff;
  box-shadow: 0 2px 6px rgba(59,130,246,0.25);
}
.btn-primary:hover:not(:disabled) {
  background: linear-gradient(135deg, #60a5fa, #3b82f6);
  transform: translateY(-1px);
}

.btn-ghost {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  color: #d1d5db;
}
.btn-ghost:hover:not(:disabled) { background: rgba(255,255,255,0.13); }

.btn-sq { width: 40px; padding: 0; font-size: 20px; }

.btn-vis {
  font-size: 12px; padding: 0 12px;
  background: rgba(251,191,36,0.1);
  border: 1px solid rgba(251,191,36,0.2);
  color: #fbbf24;
}
.btn-vis:hover:not(:disabled) { background: rgba(251,191,36,0.18); }
.btn-vis.is-off {
  background: rgba(239,68,68,0.1);
  border-color: rgba(239,68,68,0.2);
  color: #f87171;
}

/* Only shown on mobile */
.btn-toggle-settings { display: none; margin-left: auto; width: 36px; padding: 0; font-size: 16px; }

/* ── DATE DISPLAY ────────────────────────────────────────────────────────── */
.date-box {
  display: flex; flex-direction: column; align-items: center;
  min-width: 115px; text-align: center; gap: 1px;
}
.date-text { font-size: 14px; font-weight: 700; color: #f3f4f6; }
.status-text { font-size: 10px; color: #9ca3af; min-height: 14px; line-height: 14px; }

/* ── SNOW BADGE ──────────────────────────────────────────────────────────── */
.snow-pill {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 3px 9px; border-radius: 12px;
  font-size: 11px; font-weight: 600; line-height: 1.5;
  white-space: nowrap;
}
.snow-ok    { background: rgba(74,222,128,0.1);  color: #86efac; }
.snow-light { background: rgba(251,191,36,0.12); color: #fbbf24; }
.snow-heavy { background: rgba(248,113,113,0.13); color: #f87171; }

#snowWrap {
  display: none;
  align-items: center;
  margin-left: auto; /* push to right on desktop */
}

/* ── TOAST ───────────────────────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 72px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: rgba(17,24,39,0.92);
  border: 1px solid rgba(255,255,255,0.1);
  color: #e9ecef; padding: 8px 18px;
  border-radius: 20px; font-size: 12px;
  backdrop-filter: blur(10px); z-index: 100;
  pointer-events: none; opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ── MOBILE (<640px) — panel flips to the bottom ────────────────────────── */
@media (max-width: 639px) {
  body { flex-direction: column-reverse; } /* map top, panel bottom */

  #panel {
    border-bottom: none;
    border-top: 1px solid rgba(255,255,255,0.07);
    border-radius: 14px 14px 0 0;
    box-shadow: 0 -6px 24px rgba(0,0,0,0.35);
  }

  /* Collapse settings by default on mobile */
  .settings-row {
    max-height: 0;
    padding: 0 12px;
    border-bottom: none;
    overflow: hidden;
  }
  .settings-row.open {
    max-height: 380px;
    padding: 12px 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  /* Bigger nav targets on mobile */
  .nav-row { padding: 10px 12px; min-height: 64px; gap: 6px; }
  .btn-sq { width: 48px; height: 48px; font-size: 22px; }
  .btn-vis { height: 48px; font-size: 12px; }
  .btn-toggle-settings { display: inline-flex; height: 38px; }

  /* Snow wrap becomes a full-width row below nav on mobile */
  #snowWrap {
    margin-left: 0;
    order: 99;
    flex-basis: 100%;
    justify-content: center;
    padding-bottom: 4px;
  }

  #toast { bottom: 140px; }

  /* File input expands to available width */
  input[type="file"].ctrl { flex: 1; min-width: 0; }
}

/* ── TABLET (640–899px) ──────────────────────────────────────────────────── */
@media (min-width: 640px) and (max-width: 899px) {
  .settings-row { padding: 8px 12px; gap: 6px 8px; }
  .ctrl { height: 34px; font-size: 12px; }
  input[type="date"].ctrl { min-width: 115px; }
  .nav-row { padding: 6px 12px; min-height: 50px; }
}
</style>
</head>

<body>

<!-- Panel: settings + nav. On mobile it lives at the bottom (flex-direction:column-reverse). -->
<div id="panel">

  <div class="settings-row" id="settingsRow">
    <div class="field">
      <span class="field-label">Trace GPX</span>
      <input type="file" id="gpxFile" accept=".gpx" class="ctrl">
    </div>
    <div class="field">
      <span class="field-label">Début</span>
      <input type="date" id="startDate" class="ctrl">
    </div>
    <div class="field">
      <span class="field-label">Fin</span>
      <input type="date" id="endDate" class="ctrl">
    </div>
    <div class="field">
      <span class="field-label">Nuages max</span>
      <div class="slider-wrap">
        <input type="range" id="maxcc" min="0" max="100" value="30">
        <span class="slider-val" id="maxccVal">30%</span>
      </div>
    </div>
    <button class="btn btn-primary" id="loadBtn">&#128269; Chercher</button>
  </div>

  <div class="nav-row">
    <button class="btn btn-ghost btn-sq" id="prevBtn" disabled title="Image précédente">&#8249;</button>

    <div class="date-box">
      <div class="date-text" id="currentDate">—</div>
      <div class="status-text" id="statusMsg"></div>
    </div>

    <button class="btn btn-ghost btn-sq" id="nextBtn" disabled title="Image suivante">&#8250;</button>

    <button class="btn btn-vis" id="toggleImgBtn" disabled>&#128065; Afficher</button>

    <!-- Snow info — always in nav row; on mobile wraps to its own line -->
    <div id="snowWrap"></div>

    <!-- Mobile only: toggle settings visibility -->
    <button class="btn btn-ghost btn-toggle-settings" id="settingsToggleBtn" title="Paramètres">&#9776;</button>
  </div>

</div>

<div id="map"></div>
<div id="toast"></div>

<script>
// ── MAP ───────────────────────────────────────────────────────────────────────
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://api.maptiler.com/maps/streets/style.json?key=0WK6lHSVe5GKFunrY8Pt',
  center: [6, 45],
  zoom: 6
});
map.addControl(new maplibregl.NavigationControl());

// ── DATE HELPERS ──────────────────────────────────────────────────────────────
// Build Date in LOCAL calendar to avoid UTC midnight shifting the displayed day
function parseLocalDate(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function formatDateLocal(dt) {
  return `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
}
function todayLocal() { return formatDateLocal(new Date()); }
function addDaysLocal(dateStr, n) {
  const d = parseLocalDate(dateStr);
  d.setDate(d.getDate() + n);
  return formatDateLocal(d);
}

// Initialise date pickers: 6 months ago → today
(function () {
  const today = new Date();
  const from  = new Date(today.getFullYear(), today.getMonth() - 6, today.getDate());
  document.getElementById('endDate').value   = formatDateLocal(today);
  document.getElementById('startDate').value = formatDateLocal(from);
})();

// ── STATE ─────────────────────────────────────────────────────────────────────
const WMS_BASE  = 'https://sh.dataspace.copernicus.eu/ogc/wms/7dff4d3c-b1e3-40df-abe2-0561c1a1cf8b?';
const STAC_BASE = 'https://catalogue.dataspace.copernicus.eu/stac/collections/SENTINEL-2/items';

let allFetchedDates = [];   // [{date, cloudCover}] — raw catalog, no cc filter
let currentDates    = [];   // filtered by maxcc slider
let currentIndex    = -1;
let currentBbox     = null;
let currentCenter   = null; // {lat, lon} — centroid of GPX for snow API
let prevImageDate   = null; // date of the previously displayed image (for snow delta)
let lastObjectUrl   = null;
let imageLoaded     = false;
let imageVisible    = false;
let isLoadingImage  = false;

const snowCache = new Map(); // key → {depthCm, totalSnowfall} | null

// ── STAC CATALOG ─────────────────────────────────────────────────────────────
async function fetchCatalogDates(bbox, startDate, endDate) {
  const bboxStr  = bbox.join(',');
  const datetime = `${startDate}T00:00:00Z/${endDate}T23:59:59Z`;
  let items = [], pages = 0;
  let url = `${STAC_BASE}?bbox=${encodeURIComponent(bboxStr)}&datetime=${encodeURIComponent(datetime)}&limit=200&sortby=%2Bdatetime`;

  while (url && pages < 15) {
    pages++;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`Catalogue HTTP ${r.status}`);
    const d = await r.json();
    items = items.concat(d.features || []);
    const next = (d.links || []).find(l => l.rel === 'next');
    url = next ? next.href : null;
  }

  // Aggregate by calendar date; keep best (lowest) cloud cover per day
  const byDate = new Map();
  for (const item of items) {
    const date = (item.properties.datetime || '').slice(0, 10);
    if (!date) continue;
    const cc   = item.properties['eo:cloud_cover'] ?? null;
    const prev = byDate.get(date);
    if (!prev || (cc !== null && (prev.cloudCover === null || cc < prev.cloudCover)))
      byDate.set(date, { date, cloudCover: cc });
  }
  return Array.from(byDate.values()).sort((a, b) => a.date.localeCompare(b.date));
}

function fallbackDates(s, e) {
  const out = [];
  let d = parseLocalDate(s), end = parseLocalDate(e);
  while (d <= end) {
    out.push({ date: formatDateLocal(d), cloudCover: null });
    d.setDate(d.getDate() + 5);
  }
  return out;
}

function applyCloudFilter(maxcc) {
  currentDates = allFetchedDates.filter(d => d.cloudCover === null || d.cloudCover <= maxcc);
}

// ── SNOW API (Open-Meteo archive) ─────────────────────────────────────────────
// Shows snow depth on the current image date + snowfall accumulated since the
// previous image — giving the hiker both current conditions and change magnitude.
async function fetchSnowData(lat, lon, fromDate, toDate) {
  const key = `${lat.toFixed(2)},${lon.toFixed(2)},${fromDate},${toDate}`;
  if (snowCache.has(key)) return snowCache.get(key);

  // Open-Meteo archive lags ~5 days; skip for very recent dates
  if (toDate > addDaysLocal(todayLocal(), -5)) {
    snowCache.set(key, null);
    return null;
  }

  try {
    const r = await fetch(
      `https://archive-api.open-meteo.com/v1/archive?` +
      `latitude=${lat.toFixed(4)}&longitude=${lon.toFixed(4)}` +
      `&start_date=${fromDate}&end_date=${toDate}` +
      `&daily=snowfall_sum,snow_depth_max&timezone=UTC`
    );
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();

    const snowfalls = d.daily?.snowfall_sum  || [];
    const depths    = d.daily?.snow_depth_max || [];

    // Sum all snowfall in the period (cm); depth is in metres → cm, take last entry (= toDate)
    const totalSnowfall = Math.round(snowfalls.reduce((s, v) => s + (v || 0), 0) * 10) / 10;
    const depthCm       = Math.round((depths[depths.length - 1] ?? 0) * 100);

    const result = { depthCm, totalSnowfall };
    snowCache.set(key, result);
    return result;
  } catch (e) {
    console.warn('Open-Meteo snow API error:', e);
    snowCache.set(key, null);
    return null;
  }
}

async function refreshSnowBadge(currentDate) {
  const wrap = document.getElementById('snowWrap');
  wrap.style.display = 'none';
  if (!currentCenter || !currentDate) return;

  // Use range [prevImageDate → currentDate] to capture snowfall between images
  const fromDate = (prevImageDate && prevImageDate < currentDate) ? prevImageDate : currentDate;
  const snow = await fetchSnowData(currentCenter.lat, currentCenter.lon, fromDate, currentDate);
  if (!snow) return;

  const { depthCm, totalSnowfall } = snow;
  const hasPrevDelta = fromDate !== currentDate && totalSnowfall >= 1;

  let cls, label;
  if (depthCm <= 2 && totalSnowfall < 2) {
    cls   = 'snow-ok';
    label = '✓ Pas de neige';
  } else if (depthCm <= 25) {
    cls   = 'snow-light';
    label = `❄ ${depthCm} cm`;
    if (hasPrevDelta) label += ` · +${totalSnowfall} cm`;
  } else {
    cls   = 'snow-heavy';
    label = `🏔 ${depthCm} cm de neige`;
    if (hasPrevDelta) label += ` · +${totalSnowfall} cm`;
  }

  wrap.innerHTML = `<span class="snow-pill ${cls}" title="Données météo au point central de la trace (Open-Meteo)">${label}</span>`;
  wrap.style.display = 'flex';
}

// ── WMS ───────────────────────────────────────────────────────────────────────
function buildWmsUrl(bbox, date, maxcc) {
  return `${WMS_BASE}SERVICE=WMS&REQUEST=GetMap&VERSION=1.3.0` +
    `&LAYERS=NATURAL-COLOR&BBOX=${bbox.join(',')}&CRS=EPSG:4326` +
    `&WIDTH=1024&HEIGHT=1024&FORMAT=image/jpeg&TIME=${date}&MAXCC=${maxcc}`;
}

function expandBBoxByKm(bbox, km) {
  const [minLon, minLat, maxLon, maxLat] = bbox;
  const cLat = (minLat + maxLat) / 2;
  const dLat = km / 111.32;
  const dLon = km / (111.32 * Math.cos(cLat * Math.PI / 180));
  return [minLon - dLon, minLat - dLat, maxLon + dLon, maxLat + dLat];
}

// ── SENTINEL LAYER ────────────────────────────────────────────────────────────
function placeSentinelImage(url, bbox) {
  if (map.getLayer('sentinel-layer')) map.removeLayer('sentinel-layer');
  if (map.getSource('sentinel'))      map.removeSource('sentinel');

  map.addSource('sentinel', {
    type: 'image', url,
    coordinates: [[bbox[0],bbox[3]], [bbox[2],bbox[3]], [bbox[2],bbox[1]], [bbox[0],bbox[1]]]
  });
  const before = map.getLayer('gpx-line') ? 'gpx-line' : undefined;
  map.addLayer({
    id: 'sentinel-layer', type: 'raster', source: 'sentinel',
    layout: { visibility: imageVisible ? 'visible' : 'none' }
  }, before);
  if (map.getLayer('gpx-line')) map.moveLayer('gpx-line');

  imageLoaded = true;
  syncVisBtn();
}

function toggleVisibility() {
  if (!imageLoaded || !map.getLayer('sentinel-layer')) return;
  imageVisible = !imageVisible;
  map.setLayoutProperty('sentinel-layer', 'visibility', imageVisible ? 'visible' : 'none');
  syncVisBtn();
}

// ── UI HELPERS ────────────────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('statusMsg').textContent = msg || ''; }

function syncNavButtons() {
  document.getElementById('prevBtn').disabled = currentIndex <= 0 || !currentDates.length || isLoadingImage;
  document.getElementById('nextBtn').disabled = currentIndex >= currentDates.length - 1 || !currentDates.length || isLoadingImage;
}

function syncVisBtn() {
  const btn = document.getElementById('toggleImgBtn');
  btn.disabled = !imageLoaded;
  if (!imageLoaded) { btn.innerHTML = '&#128065; Afficher'; btn.classList.remove('is-off'); return; }
  if (imageVisible) { btn.innerHTML = '&#128065; Masquer';  btn.classList.remove('is-off'); }
  else              { btn.innerHTML = '&#128683; Masqué';   btn.classList.add('is-off'); }
}

let toastTimer = null;
function showToast(msg, persist = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  if (!persist) toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
}
function hideToast() {
  clearTimeout(toastTimer);
  document.getElementById('toast').classList.remove('show');
}

// ── SHOW IMAGE ────────────────────────────────────────────────────────────────
async function showImageForIndex(i) {
  if (!currentDates.length || i < 0 || i >= currentDates.length) return;
  if (isLoadingImage) return;

  isLoadingImage = true;
  const fromIdx  = currentIndex; // previous index for snow delta
  currentIndex   = i;
  syncNavButtons();

  const { date, cloudCover } = currentDates[i];
  document.getElementById('currentDate').textContent = date;
  const ccLabel = cloudCover !== null ? `☁ ${Math.round(cloudCover)}%` : '';
  setStatus((ccLabel ? ccLabel + ' · ' : '') + 'chargement…');
  showToast('Chargement de l\'image…', true);

  try {
    const maxcc = document.getElementById('maxcc').value;
    const r     = await fetch(buildWmsUrl(currentBbox, date, maxcc), { mode: 'cors' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const blob = await r.blob();
    if (blob.size === 0) throw new Error('image vide reçue');

    const prevDate = (fromIdx >= 0 && fromIdx < currentDates.length)
      ? currentDates[fromIdx].date : null;

    const objUrl = URL.createObjectURL(blob);
    if (lastObjectUrl) URL.revokeObjectURL(lastObjectUrl);
    lastObjectUrl = objUrl;
    placeSentinelImage(objUrl, currentBbox);

    // Auto-reveal on first load
    if (!imageVisible) {
      imageVisible = true;
      map.setLayoutProperty('sentinel-layer', 'visibility', 'visible');
      syncVisBtn();
    }

    setStatus(cloudCover !== null ? `☁ ${Math.round(cloudCover)}%` : '');
    hideToast();

    // Snow badge — async, non-blocking
    prevImageDate = prevDate;
    refreshSnowBadge(date);

  } catch (err) {
    setStatus('❌ ' + err.message);
    hideToast();
    console.error('WMS error:', err);
  }

  isLoadingImage = false;
  syncNavButtons();
}

// ── GPX → GEOJSON ─────────────────────────────────────────────────────────────
function gpxToGeoJSON(text) {
  const xml    = new DOMParser().parseFromString(text, 'text/xml');
  const pts    = xml.getElementsByTagName('trkpt');
  const coords = [];
  for (let i = 0; i < pts.length; i++)
    coords.push([parseFloat(pts[i].getAttribute('lon')), parseFloat(pts[i].getAttribute('lat'))]);
  if (!coords.length) throw new Error('Aucun point trkpt dans le GPX');
  return { type: 'Feature', geometry: { type: 'LineString', coordinates: coords } };
}

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadGPX() {
  const file     = document.getElementById('gpxFile').files[0];
  const startVal = document.getElementById('startDate').value;
  const endVal   = document.getElementById('endDate').value;

  if (!file)                return alert('Sélectionne un fichier GPX.');
  if (!startVal || !endVal) return alert('Saisis une date de début et de fin.');
  if (startVal > endVal)    return alert('La date de début doit précéder la date de fin.');

  let geojson;
  try   { geojson = gpxToGeoJSON(await file.text()); }
  catch (e) { return alert('Erreur GPX : ' + e.message); }

  // Compute bbox + centroid for snow API
  let bbox = turf.bbox(geojson);
  bbox = expandBBoxByKm(bbox, 2);
  currentBbox   = bbox;
  currentCenter = { lat: (bbox[1] + bbox[3]) / 2, lon: (bbox[0] + bbox[2]) / 2 };

  // Reset state
  allFetchedDates = []; currentDates = []; currentIndex = -1;
  prevImageDate   = null; imageLoaded = false; imageVisible = false;
  if (lastObjectUrl) { URL.revokeObjectURL(lastObjectUrl); lastObjectUrl = null; }
  document.getElementById('currentDate').textContent = '—';
  document.getElementById('snowWrap').style.display  = 'none';
  setStatus(''); syncVisBtn(); syncNavButtons();

  // Draw GPX trace
  if (map.getLayer('sentinel-layer')) map.removeLayer('sentinel-layer');
  if (map.getSource('sentinel'))      map.removeSource('sentinel');
  if (map.getSource('gpx'))           { map.removeLayer('gpx-line'); map.removeSource('gpx'); }
  map.addSource('gpx', { type: 'geojson', data: geojson });
  map.addLayer({ id: 'gpx-line', type: 'line', source: 'gpx',
    paint: { 'line-color': '#f43f5e', 'line-width': 3, 'line-opacity': 0.9 } });
  map.fitBounds([[bbox[0],bbox[1]], [bbox[2],bbox[3]]], { padding: 40 });

  // Fetch available dates from STAC catalog
  const loadBtn = document.getElementById('loadBtn');
  loadBtn.disabled = true;
  showToast('Recherche des images disponibles…', true);
  document.getElementById('currentDate').textContent = '…';

  try {
    allFetchedDates = await fetchCatalogDates(bbox, startVal, endVal);
  } catch (e) {
    console.warn('Catalogue indisponible, fallback 5j:', e);
    setStatus('⚠ Catalogue indisponible');
    allFetchedDates = fallbackDates(startVal, endVal);
  } finally {
    loadBtn.disabled = false;
    hideToast();
  }

  applyCloudFilter(parseInt(document.getElementById('maxcc').value));

  if (!currentDates.length) {
    document.getElementById('currentDate').textContent = '—';
    setStatus('Aucune image dans cette période');
    syncNavButtons();
    return;
  }

  document.getElementById('currentDate').textContent = `${currentDates.length} images`;
  await showImageForIndex(currentDates.length - 1); // most recent first
}

// ── EVENTS ────────────────────────────────────────────────────────────────────
document.getElementById('loadBtn').addEventListener('click', loadGPX);

document.getElementById('prevBtn').addEventListener('click', () => {
  if (currentIndex > 0) showImageForIndex(currentIndex - 1);
});
document.getElementById('nextBtn').addEventListener('click', () => {
  if (currentIndex < currentDates.length - 1) showImageForIndex(currentIndex + 1);
});

document.getElementById('maxcc').addEventListener('input', e => {
  document.getElementById('maxccVal').textContent = e.target.value + '%';
  if (!allFetchedDates.length) return;

  const prevDate = currentIndex >= 0 ? currentDates[currentIndex]?.date : null;
  applyCloudFilter(parseInt(e.target.value));

  if (!currentDates.length) { setStatus('Aucune image pour ce filtre'); syncNavButtons(); return; }

  // Stay on same date if still available, otherwise jump to nearest
  let newIdx = currentDates.findIndex(d => d.date === prevDate);
  if (newIdx < 0 && prevDate) {
    const prevTs = parseLocalDate(prevDate).getTime();
    newIdx = 0;
    let best = Infinity;
    currentDates.forEach((d, i) => {
      const diff = Math.abs(parseLocalDate(d.date).getTime() - prevTs);
      if (diff < best) { best = diff; newIdx = i; }
    });
  } else if (newIdx < 0) {
    newIdx = currentDates.length - 1;
  }

  syncNavButtons();
  if (!isLoadingImage) showImageForIndex(newIdx);
});

document.getElementById('toggleImgBtn').addEventListener('click', toggleVisibility);

// Mobile: toggle settings panel
document.getElementById('settingsToggleBtn').addEventListener('click', () => {
  const row = document.getElementById('settingsRow');
  const btn = document.getElementById('settingsToggleBtn');
  row.classList.toggle('open');
  btn.innerHTML = row.classList.contains('open') ? '✕' : '&#9776;';
});
</script>
